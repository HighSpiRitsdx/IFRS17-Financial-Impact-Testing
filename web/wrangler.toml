name = "ifrs17-whitebox-react-demo"
compatibility_date = "2026-03-15"
pages_build_output_dir = "dist"

[[r2_buckets]]
binding = "IFRS17_DOC_BUCKET"
bucket_name = "ifrs17-doc-bucket"
preview_bucket_name = "ifrs17-doc-bucket-preview"

[vars]
GLM_MODEL = "glm-4.6v-flashx"
GLM_API_URL = "https://open.bigmodel.cn/api/paas/v4/chat/completions"
GEMINI_MODEL = "gemini-3-flash-preview"
GEMINI_API_URL = "https://generativelanguage.googleapis.com/v1beta/models"
XIAOMI_MODEL = "mimo-v2-omni"
XIAOMI_API_URL = "https://api.xiaomimimo.com/v1/chat/completions"
IFRS17_DOC_KEY = "GLM.md"
